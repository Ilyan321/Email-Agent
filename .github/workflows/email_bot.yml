name: Email Triage Bot

on:
  schedule:
    # Runs every 15 minutes.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # Allows manual triggering from the Actions tab

concurrency:
  group: email-triage-bot
  cancel-in-progress: false   # Never kill a run that's mid-triage

jobs:
  triage:
    runs-on: ubuntu-latest
    # INCREASE TIMEOUT: Prevents GitHub from killing the script if it takes 
    # a while to gracefully handle Groq rate-limit retries on large email batches.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run email triage bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
        run: python triage_emails.py
